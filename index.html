<style>
  :root{
    --bg: #faf6ef;
    --bg-warm: #f3e8d6;
    --bg-card: #ffffff;
    --border: #e8dcc4;
    --border-strong: #d4c4a8;
    --text: #1c1815;
    --text-dim: #6b5d4c;
    --text-muted: #94866f;
    --wine: #8b1e1e;
    --wine-dark: #6b1414;
    --gold: #b88a3a;
    --forest: #2c5f2d;
    --amber: #c2660b;
    --rose: #c44763;
    --ok: #2c5f2d;
    --warn: #b88a3a;
    --bad: #8b1e1e;
  }
  html,body,#root{ background:var(--bg); color:var(--text); font-family:'Manrope',sans-serif; -webkit-tap-highlight-color: transparent; }
  body{ overscroll-behavior-y: contain; }
  .font-display{ font-family:'Fraunces',Georgia,serif; font-optical-sizing:auto; font-variation-settings: "opsz" 96; letter-spacing:-0.02em; }
  .font-serif-body{ font-family:'Fraunces',Georgia,serif; font-variation-settings: "opsz" 14; }
  .hairline{ border-color: var(--border); }
  .hairline-strong{ border-color: var(--border-strong); }
  .card{ background:var(--bg-card); border:1px solid var(--border); }
  .surface-warm{ background: var(--bg-warm); }
  .text-dim{ color: var(--text-dim); }
  .text-muted{ color: var(--text-muted); }
  .wine{ color: var(--wine); }
  .bg-wine{ background:var(--wine); }
  .bg-wine-dark{ background:var(--wine-dark); }
  .border-wine{ border-color: var(--wine); }
  .gold{ color: var(--gold); }
  .bg-gold{ background: var(--gold); }
  .forest{ color: var(--forest); }
  .bg-forest{ background: var(--forest); }
  .amber{ color: var(--amber); }
  .bg-amber{ background: var(--amber); }

  /* horizontal scroll */
  .no-scrollbar::-webkit-scrollbar{ display:none; }
  .no-scrollbar{ scrollbar-width:none; }

  /* tab pill */
  .pill{ transition: all 180ms ease; }
  .pill:hover{ transform: translateY(-1px); }

  /* dish card hover */
  .dish-card{ transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease; }
  .dish-card:hover{ transform: translateY(-3px); box-shadow: 0 10px 30px -16px rgba(28,24,21,0.18); border-color: var(--border-strong); }

  /* badge */
  .badge{ font-size:11px; letter-spacing:.05em; text-transform:uppercase; font-weight:600; }

  /* skeleton ambient */
  .grain{ position: relative; }
  .grain::before{
    content:''; position:absolute; inset:0; pointer-events:none; opacity:.4;
    background-image: radial-gradient(circle at 1px 1px, rgba(28,24,21,0.05) 1px, transparent 0);
    background-size: 14px 14px;
  }

  /* sticky cook header */
  .countdown-strong{ color: var(--wine); }
  .countdown-warn{ color: var(--amber); }
  .countdown-ok{ color: var(--forest); }

  /* simple slide-up modal */
  .modal-backdrop{ background: rgba(28,24,21,0.55); backdrop-filter: blur(6px); }
  @keyframes pop { from{ opacity:0; transform: translateY(12px) scale(.985); } to{ opacity:1; transform: translateY(0) scale(1); } }
  .pop{ animation: pop 220ms cubic-bezier(.2,.8,.2,1); }
  @keyframes fade { from{ opacity:0; } to{ opacity:1; } }
  .fade{ animation: fade 180ms ease; }

  /* star hover */
  .star-btn{ transition: transform 140ms ease; }
  .star-btn:hover{ transform: scale(1.12); }

  /* divider with text */
  .divider{ display:flex; align-items:center; gap:.75rem; color: var(--text-muted); font-size:11px; letter-spacing:.18em; text-transform:uppercase; }
  .divider::before, .divider::after{ content:''; height:1px; background: var(--border); flex:1; }

  /* nav */
  .navlink{ position:relative; padding:.35rem .1rem; color: var(--text-dim); font-weight:500; }
  .navlink.active{ color: var(--text); }
  .navlink.active::after{
    content:''; position:absolute; left:0; right:0; bottom:-8px; height:2px; background: var(--wine);
  }

  /* range input */
  input[type=range]{ accent-color: var(--wine); }
  /* number/text inputs */
  .field{
    background:#fff; border:1px solid var(--border); border-radius: 8px;
    padding: .65rem .85rem; font-size: 16px; width: 100%; outline:none;
    transition: border-color 160ms ease, box-shadow 160ms ease;
    -webkit-appearance: none;
  }
  .field:focus{ border-color: var(--wine); box-shadow: 0 0 0 3px rgba(139,30,30,.10); }
  .field-label{ font-size: 11px; letter-spacing:.12em; text-transform:uppercase; color: var(--text-muted); margin-bottom: 6px; font-weight:600; }

  /* mobile-friendly icon button (min 44x44 for touch) */
  .icon-btn{
    min-width: 44px; min-height: 44px; display:inline-flex; align-items:center; justify-content:center;
    border-radius: 10px; border: 1px solid var(--border); background:#fff;
    transition: background 140ms ease, transform 120ms ease, border-color 140ms ease;
  }
  .icon-btn:active{ transform: scale(.94); background: var(--bg-warm); }
  .icon-btn.danger{ color: var(--wine); }
  .icon-btn.danger:active{ background: #fdf3f3; border-color: var(--wine); }

  /* button base */
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:.5rem; font-weight:600; transition: all 160ms ease; }
  .btn:disabled{ opacity:.5; cursor:not-allowed; }
  .btn-primary{ background: var(--wine); color:#fff; border-radius: 999px; padding: .65rem 1.1rem; }
  .btn-primary:hover:not(:disabled){ background: var(--wine-dark); }
  .btn-ghost{ background: transparent; color: var(--text); border:1px solid var(--border-strong); border-radius: 999px; padding: .55rem 1rem; }
  .btn-ghost:hover{ background: var(--bg-warm); }
  .btn-soft{ background: var(--bg-warm); color: var(--text); border-radius: 999px; padding: .55rem 1rem; }
  .btn-soft:hover{ background: #ecdcc0; }
  .btn-danger{ background:#fff; color: var(--wine); border:1px solid var(--border-strong); border-radius: 999px; padding: .5rem .9rem; }
  .btn-danger:hover{ background: #fdf3f3; border-color: var(--wine); }

  /* category pill */
  .cat-pill{ border:1px solid var(--border); background:#fff; color: var(--text-dim); padding: .45rem .9rem; border-radius: 999px; font-weight: 500; font-size: 13px; white-space: nowrap; }
  .cat-pill.active{ background: var(--text); color: #fff; border-color: var(--text); }

  /* dish placeholder block */
  .dish-art{
    background: linear-gradient(135deg, #f7ecd8 0%, #efe0c2 60%, #e8d4a8 100%);
    position:relative; overflow:hidden;
  }
  .dish-art::after{
    content:''; position:absolute; inset:0; opacity:.25;
    background-image: radial-gradient(circle at 30% 30%, rgba(255,255,255,.7), transparent 40%);
  }

  /* status dot */
  .dot{ width:8px; height:8px; border-radius:50%; display:inline-block; }
  .dot-pending{ background: var(--gold); }
  .dot-cooking{ background: var(--amber); }
  .dot-ready{ background: var(--forest); }
  .dot-done{ background: var(--text-muted); }

  /* shake on critical */
  @keyframes wiggle { 0%,100%{ transform: rotate(0); } 25%{ transform: rotate(-2deg); } 75%{ transform: rotate(2deg); } }
  .wiggle{ animation: wiggle 600ms ease infinite; }

  /* ============ iOS SAFE-AREA (челка, Dynamic Island, home indicator) ============ */
  :root{
    --sa-top: env(safe-area-inset-top, 0px);
    --sa-bottom: env(safe-area-inset-bottom, 0px);
    --sa-left: env(safe-area-inset-left, 0px);
    --sa-right: env(safe-area-inset-right, 0px);
  }

  /* Шапка прижата к верху и учитывает челку */
  header.app-header{
    padding-top: var(--sa-top);
  }

  /* Контент по бокам учитывает скругления (важно в ландшафте) */
  .safe-x{
    padding-left: max(1rem, var(--sa-left));
    padding-right: max(1rem, var(--sa-right));
  }
  @media (min-width: 640px){
    .safe-x{
      padding-left: max(1.5rem, var(--sa-left));
      padding-right: max(1.5rem, var(--sa-right));
    }
  }

  /* Нижний таб-бар поднят над home indicator */
  .bottomnav{
    padding-bottom: var(--sa-bottom);
    padding-left: var(--sa-left);
    padding-right: var(--sa-right);
  }

  /* Основной контент имеет padding снизу под таб-бар + home indicator */
  .has-bottomnav{
    padding-bottom: calc(72px + var(--sa-bottom));
  }
  @media (min-width: 640px){
    .has-bottomnav{ padding-bottom: 0; }
  }

  /* Bottom-sheet модалки — снизу padding под home indicator */
  .sheet-content{
    padding-bottom: calc(1rem + var(--sa-bottom)) !important;
  }
  @media (min-width: 640px){
    .sheet-content{ padding-bottom: 1.25rem !important; }
  }

  /* Footer не залазит на home indicator */
  footer.app-footer{
    padding-bottom: calc(2.5rem + var(--sa-bottom));
  }
  @media (min-width: 640px){
    footer.app-footer{ padding-bottom: 2.5rem; }
  }

  /* Smooth scroll для iOS */
  body, .scroll-smooth-ios{
    -webkit-overflow-scrolling: touch;
  }

  /* Предотвращаем горизонтальную прокрутку на iPhone */
  html, body{
    overflow-x: hidden;
    width: 100%;
  }

  /* Фон тянется в safe-area сверху и снизу */
  html{ background: var(--bg); }
  body{ background: var(--bg); }

  /* На iPhone Safari 100vh глючит из-за исчезающего URL-бара. 100dvh всегда корректная высота. */
  .min-h-screen{ min-height: 100dvh; }

  /* ============ TOUCH OPTIMIZATION ============ */

  /* Убираем задержку 300ms на всех тач-устройствах + запрет на выделение текста на кнопках */
  button, .btn, .pill, .cat-pill, .navlink, .tab-btn, .icon-btn, .stepper button, .star-btn {
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }

  /* Hover-эффекты ТОЛЬКО на устройствах с настоящим hover (десктоп с мышкой) */
  @media (hover: none) {
    .btn-primary:hover:not(:disabled){ background: var(--wine); }
    .btn-ghost:hover{ background: transparent; }
    .btn-soft:hover{ background: var(--bg-warm); }
    .btn-danger:hover{ background: #fff; border-color: var(--border-strong); }
    .cat-pill:hover{ /* no-op */ }
    .star-btn:hover{ transform: none; }
    .dish-card:hover{ transform: none; box-shadow: none; border-color: var(--border); }
  }

  /* Сильные active-состояния для тач-фидбэка */
  .btn:active:not(:disabled){ transform: scale(0.96); transition: transform 80ms ease; }
  .btn-primary:active:not(:disabled){ background: var(--wine-dark); }
  .btn-ghost:active{ background: var(--bg-warm); }
  .btn-soft:active{ background: #ecdcc0; }
  .btn-danger:active{ background: #fdf3f3; }
  .cat-pill:active{ transform: scale(0.95); transition: transform 80ms ease; }
  .navlink:active{ opacity: 0.6; }
  .icon-btn:active{ transform: scale(0.92); }
  .tab-btn:active{ background: var(--bg-warm); }
  .star-btn:active{ transform: scale(1.2) !important; }
  .dish-card:active{ transform: scale(0.99); transition: transform 80ms ease; }
  .stepper button:active{ background: var(--border-strong); }
  .emoji-tile:active{ transform: scale(0.9); }

  /* Эмодзи-плитки в DishModal — крупнее и квадратные для тача */
  .emoji-tile{
    width: 44px; height: 44px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 10px; font-size: 22px;
    transition: transform 80ms ease, background-color 140ms ease;
  }
  .emoji-tile.selected{ background: var(--wine); color: #fff; }

  /* Грэббер сверху bottom-sheet модалок (намёк "потяни вниз") */
  .sheet-grabber{
    width: 36px; height: 4px; border-radius: 4px;
    background: var(--border-strong);
    margin: 8px auto 0;
  }
  @media (min-width: 640px){ .sheet-grabber{ display: none; } }

  /* Кнопка закрытия модалки крупнее на тач */
  .modal-close{
    width: 40px; height: 40px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 999px;
    background: rgba(255,255,255,0.92);
  }
  .modal-close:active{ background: rgba(255,255,255,1); transform: scale(0.92); }

  /* Кнопки в нижнем таб-баре — крупнее иконки, чтоб попадать наверняка */
  @media (max-width: 640px){
    .tab-btn{ min-height: 60px; }
    .tab-btn svg{ width: 24px; height: 24px; }
  }

  /* Отключаем синюю подсветку при тапе на ссылки/кнопки в iOS Safari */
  a, button, [role="button"], .dish-card, label {
    -webkit-tap-highlight-color: transparent;
  }

  /* iOS не зумит при фокусе если шрифт ≥ 16px */
  @media (max-width: 640px){
    .field{ font-size: 16px; padding: .7rem .85rem; }
    select.field{ font-size: 16px; }
    .btn{ min-height: 44px; }
    .btn-primary, .btn-ghost, .btn-soft, .btn-danger{ padding: .7rem 1.15rem; min-height: 44px; }
    .cat-pill{ padding: .55rem 1rem; font-size: 14px; }
    /* убрать hover-эффекты на тач-устройствах — они залипают */
    .dish-card:hover{ transform: none; box-shadow: none; }
    .pill:hover{ transform: none; }
  }

  /* нижний таб-бар (только мобиле) */
  .bottomnav{
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .bottomnav-row{ display: grid; }
  .tab-btn{
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 8px 4px 6px; gap: 2px;
    color: var(--text-muted);
    font-size: 10px; font-weight: 600; letter-spacing: .02em;
    min-height: 56px; position: relative;
    transition: color 140ms ease;
  }
  .tab-btn.active{ color: var(--wine); }
  .tab-btn:active{ background: var(--bg-warm); }
  .tab-btn svg{ width: 22px; height: 22px; }
  .tab-badge{
    position: absolute; top: 6px; left: 50%; transform: translateX(8px);
    background: var(--wine); color: #fff;
    border-radius: 999px; padding: 1px 5px; font-size: 9px; line-height: 1.4;
    font-weight: 700; min-width: 16px; text-align: center;
  }
  .tab-badge-amber{ background: var(--amber); }

  /* у основной зоны нижний отступ под таб-баром */
